# Shopify CLI – Theme-Konfiguration AMG Tech Shop
#
# development-Environment zeigt auf eine UNPUBLISHED-Kopie des MAIN-Themes.
# Tests pushen ausschliesslich in dieses isolierte Theme, niemals direkt
# ins Live-Theme. Kunden sehen Test-Aenderungen NIE.
#
# Zugriff auf das Test-Theme via Storefront-URL + ?preview_theme_id=...
# (siehe tests/fixtures.ts withTheme()-Helper).

[environments.development]
store = "amgtechtrockeneis.myshopify.com"
theme = "188973449564"

# Production-Block — wenn du irgendwann manuell ins Live-Theme pushen willst:
# [environments.production]
# store = "amgtechtrockeneis.myshopify.com"
# theme = "187811070300"

ignore = [
  "tests/**",
  "playwright.config.ts",
  "playwright/**",
  "qa-screenshots/**",
  "playwright-report/**",
  "test-results/**",
  "package.json",
  "package-lock.json",
  "node_modules/**",
  ".env*",
  ".gitignore",
  ".claude/**",
  ".mcp.json",
  "CLAUDE.md"
]
